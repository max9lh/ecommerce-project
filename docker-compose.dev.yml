# ============================================================
# Gestor Financiero - Docker Compose para DESARROLLO
# Hot-reload habilitado, puertos expuestos, logs en consola
# ============================================================
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================

services:

  db_service:
    ports:
      - "5432:5432"

  api_service:
    build:
      target: builder
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_service:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      BCRYPT_ROUNDS: 10
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && npx nodemon src/server.js"
    ports:
      - "3000:3000"

    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./backend/package.json

  frontend_service:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      target: dev
    environment:
      VITE_API_URL: http://localhost:3000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/package.json

  proxy_service:
    ports:
      - "8080:80"
