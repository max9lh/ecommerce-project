# ============================================================
#   Gestor Financiero Automatizado
#   Docker Compose - Orquestación de servicios
#   ============================================================
#   Servicios:
#     - db_service       → PostgreSQL 16
#     - api_service      → Node.js + Express + Prisma
#     - frontend_service → React (servido por Nginx interno)
#     - proxy_service    → Nginx (proxy inverso + SSL)
#   ============================================================

services:

  db_service:
    image: postgres:16-alpine
    container_name: gestor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestor_financiero}
      POSTGRES_USER: ${POSTGRES_USER:-gestor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?La variable POSTGRES_PASSWORD es obligatoria}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor_user} -d ${POSTGRES_DB:-gestor_financiero}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api_service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: gestor_api
    restart: unless-stopped
    depends_on:
      db_service:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestor_user}:${POSTGRES_PASSWORD}@db_service:5432/${POSTGRES_DB:-gestor_financiero}?schema=public
      JWT_SECRET: ${JWT_SECRET:?La variable JWT_SECRET es obligatoria}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost}
    volumes:
      - api_logs:/app/logs
    networks:
      - backend_network
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "3000"

  frontend_service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_URL: ${VITE_API_URL:-https://localhost/api}
    container_name: gestor_frontend
    restart: unless-stopped
    depends_on:
      api_service:
        condition: service_healthy
    networks:
      - frontend_network
    expose:
      - "80"
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==============================================================
  # PROXY INVERSO - Nginx (punto de entrada único)
  # ==============================================================
  proxy_service:
    image: nginx:1.25-alpine
    container_name: gestor_proxy
    restart: unless-stopped
    depends_on:
      - api_service
      - frontend_service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - frontend_network
      - backend_network
    healthcheck:
      test: [ "CMD-SHELL", "nginx -t && wget --quiet --tries=1 --spider http://localhost:80 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

# ==============================================================
# REDES - Segmentación de red para mayor seguridad
# ==============================================================
networks:
  # Red interna: api <-> db (la DB no es accesible desde el frontend ni desde afuera)
  backend_network:
    driver: bridge
    internal: false

  # Red para tráfico público: proxy <-> frontend <-> api
  frontend_network:
    driver: bridge

# ==============================================================
# VOLÚMENES - Persistencia de datos
# ==============================================================
volumes:
  db_data:
    driver: local

  api_logs:
    driver: local

  certbot_webroot:
    driver: local
