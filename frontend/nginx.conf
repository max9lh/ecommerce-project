# ============================================================
# Nginx - Configuración del contenedor Frontend
# Solo se usa dentro del contenedor frontend para servir React
# ============================================================
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json application/javascript;

    # Cache de assets con hash (Vite los genera con contenthash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Para React Router: siempre devolver index.html para rutas SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
